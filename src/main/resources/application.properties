spring.application.name=flight-data-api

# MySQL - update password to match your local MySQL root password
spring.datasource.url=jdbc:mysql://localhost:3306/flight_data?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate creates/updates schema automatically on startup
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Paths to data files (relative to working directory - project root when using mvn spring-boot:run)
app.data.airports-file=airports.csv
app.data.routes-file=routes.dat

# Pagination
spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100

logging.level.com.flightdata=INFO
logging.level.org.hibernate.SQL=WARN
